<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --red-dark: #D64545;
      --red-main: #E45858;
      --track: #E5E7EB;
      --muted: #64748B;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .slider-shell {
      position: relative;
      width: 100%;
      padding: 34px 2px 0 2px;
      user-select: none;
      touch-action: none;
    }

    .track {
      position: relative;
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: var(--track);
      cursor: pointer;
    }

    .fill {
      position: absolute;
      inset: 0 auto 0 0;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--red-dark), var(--red-main));
      pointer-events: none;
    }

    .thumb {
      position: absolute;
      top: 50%;
      width: 32px;
      height: 32px;
      border: 4px solid #fff;
      border-radius: 50%;
      background: var(--red-main);
      transform: translate(-50%, -50%);
      box-shadow: 0 6px 16px rgba(239, 68, 68, 0.22);
      cursor: grab;
      outline: none;
    }

    .thumb:active {
      cursor: grabbing;
    }

    .thumb:focus-visible {
      box-shadow:
        0 0 0 3px rgba(228, 88, 88, 0.22),
        0 6px 16px rgba(239, 68, 68, 0.22);
    }

    .value-label {
      position: absolute;
      top: -34px;
      transform: translateX(-50%);
      color: var(--red-main);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
      pointer-events: none;
    }

    .scale {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    let currentValue = 0;
    let minValue = 0;
    let maxValue = 100;
    let stepValue = 1;
    let dragging = false;

    const root = document.getElementById("root");

    function clamp(value) {
      return Math.min(maxValue, Math.max(minValue, value));
    }

    function snap(value) {
      const snapped = Math.round((value - minValue) / stepValue) * stepValue + minValue;
      return clamp(snapped);
    }

    function percentFor(value) {
      const span = maxValue - minValue || 1;
      return ((value - minValue) / span) * 100;
    }

    function sendMessage(type, data = {}) {
      window.parent.postMessage(
        {
          isStreamlitMessage: true,
          type,
          ...data,
        },
        "*"
      );
    }

    function sendReady() {
      sendMessage("streamlit:componentReady", { apiVersion: 1 });
    }

    function setFrameHeight() {
      sendMessage("streamlit:setFrameHeight", { height: 74 });
    }

    function setComponentValue(value) {
      sendMessage("streamlit:setComponentValue", { value });
    }

    function render() {
      const pct = percentFor(currentValue);

      root.innerHTML = `
        <div class="slider-shell">
          <div class="track" id="track">
            <div class="fill" style="width:${pct}%"></div>
            <div class="value-label" style="left:${pct}%">${Math.round(currentValue)}%</div>
            <button
              class="thumb"
              id="thumb"
              type="button"
              aria-label="Target percentage"
              aria-valuemin="${minValue}"
              aria-valuemax="${maxValue}"
              aria-valuenow="${currentValue}"
              style="left:${pct}%"
            ></button>
          </div>
          <div class="scale">
            <span>${minValue}%</span>
            <span>${maxValue}%</span>
          </div>
        </div>
      `;

      const track = document.getElementById("track");
      const thumb = document.getElementById("thumb");

      function valueFromClientX(clientX) {
        const rect = track.getBoundingClientRect();
        const ratio = (clientX - rect.left) / rect.width;
        return snap(minValue + ratio * (maxValue - minValue));
      }

      function updateFromPointer(clientX) {
        const next = valueFromClientX(clientX);
        if (next !== currentValue) {
          currentValue = next;
          render();
          setComponentValue(currentValue);
        }
      }

      track.addEventListener("pointerdown", (event) => {
        dragging = true;
        track.setPointerCapture(event.pointerId);
        updateFromPointer(event.clientX);
      });

      track.addEventListener("pointermove", (event) => {
        if (dragging) {
          updateFromPointer(event.clientX);
        }
      });

      track.addEventListener("pointerup", (event) => {
        dragging = false;
        if (track.hasPointerCapture(event.pointerId)) {
          track.releasePointerCapture(event.pointerId);
        }
      });

      track.addEventListener("pointercancel", () => {
        dragging = false;
      });

      thumb.addEventListener("keydown", (event) => {
        let next = currentValue;

        if (event.key === "ArrowRight" || event.key === "ArrowUp") {
          next = snap(currentValue + stepValue);
        } else if (event.key === "ArrowLeft" || event.key === "ArrowDown") {
          next = snap(currentValue - stepValue);
        } else if (event.key === "Home") {
          next = minValue;
        } else if (event.key === "End") {
          next = maxValue;
        } else {
          return;
        }

        event.preventDefault();

        if (next !== currentValue) {
          currentValue = next;
          render();
          setComponentValue(currentValue);
          requestAnimationFrame(() => {
            document.getElementById("thumb")?.focus();
          });
        }
      });

      setFrameHeight();
    }

    window.addEventListener("message", (event) => {
      const message = event.data;

      if (!message || message.type !== "streamlit:render") {
        return;
      }

      const args = message.args || {};

      minValue = Number(args.min_value ?? 0);
      maxValue = Number(args.max_value ?? 100);
      stepValue = Number(args.step ?? 1);
      currentValue = snap(Number(args.value ?? minValue));

      render();
    });

    sendReady();
    setFrameHeight();
  </script>
</body>
</html>
