<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --red-dark: #D64545;
      --red-main: #E45858;
      --track: #E5E7EB;
      --muted: #64748B;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .slider-shell {
      width: 100%;
      padding: 34px 2px 0;
      user-select: none;
      touch-action: none;
    }

    .track {
      position: relative;
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: var(--track);
      cursor: pointer;
    }

    .fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--red-dark), var(--red-main));
      pointer-events: none;
    }

    .thumb {
      position: absolute;
      top: 50%;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 4px solid #fff;
      border-radius: 50%;
      background: var(--red-main);
      transform: translate(-50%, -50%);
      box-shadow: 0 6px 16px rgba(239, 68, 68, 0.22);
      cursor: grab;
      outline: none;
    }

    .thumb:active { cursor: grabbing; }

    .thumb:focus-visible {
      box-shadow:
        0 0 0 3px rgba(228, 88, 88, 0.22),
        0 6px 16px rgba(239, 68, 68, 0.22);
    }

    .value-label {
      position: absolute;
      top: -34px;
      transform: translateX(-50%);
      color: var(--red-main);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
      pointer-events: none;
    }

    .scale {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="slider-shell">
      <div class="track" id="track">
        <div class="fill" id="fill"></div>
        <div class="value-label" id="valueLabel"></div>
        <button class="thumb" id="thumb" type="button"></button>
      </div>
      <div class="scale">
        <span id="minLabel">0%</span>
        <span id="maxLabel">100%</span>
      </div>
    </div>
  </div>

  <script>
    let currentValue = 0;
    let committedValue = 0;
    let minValue = 0;
    let maxValue = 100;
    let stepValue = 1;
    let dragging = false;
    let activePointerId = null;

    const track = document.getElementById("track");
    const fill = document.getElementById("fill");
    const thumb = document.getElementById("thumb");
    const valueLabel = document.getElementById("valueLabel");
    const minLabel = document.getElementById("minLabel");
    const maxLabel = document.getElementById("maxLabel");

    function sendMessage(type, data = {}) {
      window.parent.postMessage(
        { isStreamlitMessage: true, type, ...data },
        "*"
      );
    }

    function clamp(value) {
      return Math.min(maxValue, Math.max(minValue, value));
    }

    function snap(value) {
      const snapped =
        Math.round((value - minValue) / stepValue) * stepValue + minValue;
      return clamp(snapped);
    }

    function percentFor(value) {
      const span = maxValue - minValue || 1;
      return ((value - minValue) / span) * 100;
    }

    function applyVisual() {
      const pct = percentFor(currentValue);
      fill.style.width = `${pct}%`;
      thumb.style.left = `${pct}%`;
      valueLabel.style.left = `${pct}%`;
      valueLabel.textContent = `${Math.round(currentValue)}%`;
      thumb.setAttribute("aria-valuemin", String(minValue));
      thumb.setAttribute("aria-valuemax", String(maxValue));
      thumb.setAttribute("aria-valuenow", String(currentValue));
      thumb.setAttribute("aria-label", "Target percentage");
      minLabel.textContent = `${minValue}%`;
      maxLabel.textContent = `${maxValue}%`;
    }

    function setFrameHeight() {
      sendMessage("streamlit:setFrameHeight", { height: 76 });
    }

    function commitValue() {
      if (currentValue !== committedValue) {
        committedValue = currentValue;
        sendMessage("streamlit:setComponentValue", {
          value: currentValue,
        });
      }
    }

    function valueFromClientX(clientX) {
      const rect = track.getBoundingClientRect();
      const ratio = (clientX - rect.left) / rect.width;
      return snap(minValue + ratio * (maxValue - minValue));
    }

    function updateFromClientX(clientX) {
      currentValue = valueFromClientX(clientX);
      applyVisual();
    }

    track.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      dragging = true;
      activePointerId = event.pointerId;
      track.setPointerCapture(event.pointerId);
      updateFromClientX(event.clientX);
    });

    track.addEventListener("pointermove", (event) => {
      if (!dragging || event.pointerId !== activePointerId) return;
      updateFromClientX(event.clientX);
    });

    track.addEventListener("pointerup", (event) => {
      if (event.pointerId !== activePointerId) return;
      updateFromClientX(event.clientX);
      dragging = false;
      activePointerId = null;
      if (track.hasPointerCapture(event.pointerId)) {
        track.releasePointerCapture(event.pointerId);
      }
      commitValue();
    });

    track.addEventListener("pointercancel", (event) => {
      dragging = false;
      activePointerId = null;
      if (track.hasPointerCapture(event.pointerId)) {
        track.releasePointerCapture(event.pointerId);
      }
      currentValue = committedValue;
      applyVisual();
    });

    thumb.addEventListener("keydown", (event) => {
      let next = currentValue;

      if (event.key === "ArrowRight" || event.key === "ArrowUp") {
        next = snap(currentValue + stepValue);
      } else if (event.key === "ArrowLeft" || event.key === "ArrowDown") {
        next = snap(currentValue - stepValue);
      } else if (event.key === "Home") {
        next = minValue;
      } else if (event.key === "End") {
        next = maxValue;
      } else {
        return;
      }

      event.preventDefault();
      currentValue = next;
      applyVisual();
      commitValue();
    });

    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || message.type !== "streamlit:render") return;

      const args = message.args || {};
      minValue = Number(args.min_value ?? 0);
      maxValue = Number(args.max_value ?? 100);
      stepValue = Number(args.step ?? 1);

      const incomingValue = snap(Number(args.value ?? minValue));

      // Do not overwrite the slider while the user is actively dragging it.
      if (!dragging) {
        currentValue = incomingValue;
        committedValue = incomingValue;
        applyVisual();
      }

      setFrameHeight();
    });

    sendMessage("streamlit:componentReady", { apiVersion: 1 });
    applyVisual();
    setFrameHeight();
  </script>
</body>
</html>
